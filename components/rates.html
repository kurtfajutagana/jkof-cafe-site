<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKOF Internet Cafe - Rates</title>
    <link rel="icon" href="../images/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        body {
            padding-top: 100px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="../images/logo.jpg" alt="JKOF Internet Cafe" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="arena.html">Esports</a>
            <a href="hub.html">Creator Hub</a>
            <a href="rates.html" style="color: var(--neon-cyan);">Rates</a>
            <a href="brochure.html">Brochure</a>
        </div>
    </nav>

    <section id="rates" class="fade-in">
        <h2 class="section-title">Rates & Packages</h2>
        <div style="max-width: 800px; margin: 0 auto;">
            <table style="margin-bottom: 40px;">
                <thead>
                    <tr>
                        <th>Pass</th>
                        <th>Rate</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Regular PC</td>
                        <td>P30/hr</td>
                    </tr>
                    <tr>
                        <td>VIP Rig</td>
                        <td>P50/hr</td>
                    </tr>
                    <tr>
                        <td>Day Pass</td>
                        <td>P250</td>
                    </tr>
                </tbody>
            </table>
            <div class="promo-banner" style="border-radius: 8px;">
                <h4>STUDENT PROMO</h4>
                <p>Show your valid School ID for 10% off your hourly rate!</p>
            </div>
        </div>
    </section>

    <footer>
        <div style="display: flex; justify-content: center; margin-bottom: 30px;">
            <a href="index.html" class="logo">
                <img src="../images/logo.jpg" alt="JKOF Internet Cafe" class="logo-img" style="height: 100px;">
            </a>
        </div>
        <div class="footer-info">
            <h3 style="color: #fff; margin-bottom: 15px;">Visit us</h3>
            <p>123 Tech Hub Avenue, Pasig City</p>
            <p>+123-456-7890</p>
            <p>@JKOFCafe</p>
            <p>hello@jkofcafe.com</p>
        </div>
    </footer>

    <script>
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in').forEach((element) => {
            observer.observe(element);
        });
    </script>
</body>

</html>
